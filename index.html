<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta Tags -->
    <title>STARTOVA | Business Development & Marketing Agency</title>
    <meta name="title" content="STARTOVA | Business Development & Marketing Agency" />
    <meta name="description" content="STARTOVA is a Business Development-driven marketing agency. We build integrated growth systems — technology, social media, training, events, and media — designed to grow your business." />
    <meta name="keywords" content="marketing agency, business development, technology solutions, social media marketing, brand growth, digital marketing, events management, media production, business consulting" />
    <meta name="author" content="STARTOVA" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://startova.com/" />
    <meta property="og:title" content="STARTOVA | Business Development & Marketing Agency" />
    <meta property="og:description" content="We build integrated growth systems — technology, social media, training, events, and media — designed to grow your business. Business Development Driven." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="STARTOVA — Business Development Driven" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:site_name" content="STARTOVA" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@startova" />
    <meta name="twitter:creator" content="@startova" />
    <meta name="twitter:url" content="https://startova.com/" />
    <meta name="twitter:title" content="STARTOVA | Business Development & Marketing Agency" />
    <meta name="twitter:description" content="We build integrated growth systems — technology, social media, training, events, and media — designed to grow your business." />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="STARTOVA — Business Development Driven" />

    <!-- Canonical -->
    <link rel="canonical" href="https://startova.com/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MarketingAgency",
      "name": "STARTOVA",
      "description": "A Business Development-driven marketing agency that builds integrated growth systems for founders and brands.",
      "url": "https://startova.com",
      "logo": "https://startova.com/favicon.svg",
      "image": "https://startova.com/og-image.png",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "English"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Technology Solutions" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Social Media Marketing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Business Training" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Events Management" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Media Production" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
