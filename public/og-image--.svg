<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="cubeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Right side glow circle (behind cube) -->
  <ellipse cx="950" cy="340" rx="220" ry="220" fill="url(#cubeGlow)"/>

  <!-- Wireframe Cube (right side decoration) -->
  <!-- Front face -->
  <line x1="810" y1="430" x2="970" y2="430" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="970" y1="430" x2="970" y2="260" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="970" y1="260" x2="810" y2="260" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="810" y1="260" x2="810" y2="430" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- Back face -->
  <line x1="890" y1="350" x2="1050" y2="350" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="1050" y1="350" x2="1050" y2="180" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="1050" y1="180" x2="890" y2="180" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="890" y1="180" x2="890" y2="350" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Connecting edges -->
  <line x1="810" y1="430" x2="890" y2="350" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <line x1="970" y1="430" x2="1050" y2="350" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <line x1="970" y1="260" x2="1050" y2="180" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <line x1="810" y1="260" x2="890" y2="180" stroke="white" stroke-width="1.5" opacity="0.55"/>

  <!-- Inner cube grid (front face) -->
  <line x1="863" y1="430" x2="863" y2="260" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="917" y1="430" x2="917" y2="260" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="810" y1="376" x2="970" y2="376" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="810" y1="314" x2="970" y2="314" stroke="white" stroke-width="0.5" opacity="0.2"/>

  <!-- Bottom glow under cube -->
  <ellipse cx="890" cy="440" rx="90" ry="12" fill="white" opacity="0.04"/>

  <!-- Left content area -->

  <!-- Brand badge -->
  <rect x="100" y="100" width="220" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="120" cy="117" r="4" fill="white" opacity="0.6"/>
  <text x="134" y="122" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="white" opacity="0.6" letter-spacing="2">STARTOVA.COM</text>

  <!-- Main logo -->
  <text font-family="Inter, Arial Black, Helvetica Neue, sans-serif" font-size="104" font-weight="900" letter-spacing="-4">
    <tspan x="96" y="270" fill="white">STARTOVA</tspan><tspan fill="#4b5563">.</tspan>
  </text>

  <!-- Divider line -->
  <rect x="100" y="300" width="80" height="2" rx="1" fill="#374151"/>

  <!-- Tagline -->
  <text x="100" y="348" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="300" fill="#9ca3af" letter-spacing="0.5">Business Development Driven</text>

  <!-- Service pills -->
  <rect x="100" y="380" width="110" height="30" rx="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <text x="155" y="400" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#9ca3af" text-anchor="middle">Technology</text>

  <rect x="220" y="380" width="118" height="30" rx="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <text x="279" y="400" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#9ca3af" text-anchor="middle">Social Media</text>

  <rect x="348" y="380" width="92" height="30" rx="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <text x="394" y="400" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#9ca3af" text-anchor="middle">Training</text>

  <rect x="450" y="380" width="80" height="30" rx="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <text x="490" y="400" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#9ca3af" text-anchor="middle">Events</text>

  <rect x="540" y="380" width="72" height="30" rx="15" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
  <text x="576" y="400" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#9ca3af" text-anchor="middle">Media</text>

  <!-- Headline below -->
  <text x="100" y="470" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#6b7280">We Build Systems That Grow Businesses.</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#111111"/>
  <rect x="100" y="620" width="240" height="10" fill="white" opacity="0.06"/>
</svg>
